<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据结构选择题练习系统</title>
<style>
:root {
  --bg: #f5f6fa;
  --card-bg: #ffffff;
  --text: #2d3436;
  --text-secondary: #636e72;
  --primary: #0984e3;
  --primary-light: #dff0fd;
  --success: #00b894;
  --success-light: #d4f5e9;
  --danger: #e17055;
  --danger-light: #fde8e4;
  --warning: #fdcb6e;
  --warning-light: #fff8e1;
  --border: #dfe6e9;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 14px;
  --radius-sm: 10px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
    'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* Header */
.header {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

.header-title .icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), #6c5ce7);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
}

.header-stats {
  display: flex;
  gap: 20px;
  font-size: 14px;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.stat-dot.total { background: var(--primary); }
.stat-dot.correct { background: var(--success); }
.stat-dot.wrong { background: var(--danger); }
.stat-dot.remain { background: var(--warning); }

/* Main layout */
.main-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* Mode selector */
.mode-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 6px;
  box-shadow: var(--shadow);
}

.mode-btn {
  flex: 1;
  padding: 10px 16px;
  border: none;
  background: transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: var(--transition);
  position: relative;
}

.mode-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(9,132,227,0.3);
}

.mode-btn .badge {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  color: inherit;
  border-radius: 20px;
  padding: 1px 8px;
  font-size: 12px;
  margin-left: 6px;
  font-weight: 600;
}

.mode-btn:not(.active) .badge {
  background: var(--danger-light);
  color: var(--danger);
}

/* Chapter filter */
.chapter-filter {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.chapter-chip {
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card-bg);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: var(--transition);
  white-space: nowrap;
}

.chapter-chip:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.chapter-chip.active {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
  font-weight: 600;
}

/* Card */
.question-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.question-card.answered-correct {
  border-left: 4px solid var(--success);
}

.question-card.answered-wrong {
  border-left: 4px solid var(--danger);
}

.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.chapter-tag {
  display: inline-block;
  padding: 3px 10px;
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}

.question-num {
  font-size: 13px;
  color: var(--text-secondary);
}

.key-tag {
  display: inline-block;
  padding: 3px 10px;
  background: #fff3cd;
  color: #e67700;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 8px;
}

.question-text {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.7;
  margin-bottom: 20px;
  color: var(--text);
}

.options-list {
  display: grid;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card-bg);
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
}

.option-btn:hover:not(.disabled) {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: translateX(4px);
}

.option-btn.selected {
  border-color: var(--primary);
  background: var(--primary-light);
}

.option-btn.correct-choice {
  border-color: var(--success);
  background: var(--success-light);
}

.option-btn.wrong-choice {
  border-color: var(--danger);
  background: var(--danger-light);
}

.option-btn.disabled {
  cursor: not-allowed;
  opacity: 0.7;
}

.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  color: var(--text-secondary);
  transition: var(--transition);
}

.option-btn.selected .option-letter {
  background: var(--primary);
  color: #fff;
}

.option-btn.correct-choice .option-letter {
  background: var(--success);
  color: #fff;
}

.option-btn.wrong-choice .option-letter {
  background: var(--danger);
  color: #fff;
}

.option-icon {
  margin-left: auto;
  font-size: 18px;
  opacity: 0;
  transition: var(--transition);
}

.option-btn.correct-choice .option-icon,
.option-btn.wrong-choice .option-icon {
  opacity: 1;
}

/* Result feedback */
.result-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  margin-top: 16px;
  font-size: 14px;
  font-weight: 500;
}

.result-bar.show {
  display: flex;
}

.result-bar.correct-result {
  background: var(--success-light);
  color: #076d52;
  border: 1px solid var(--success);
}

.result-bar.wrong-result {
  background: var(--danger-light);
  color: #b33822;
  border: 1px solid var(--danger);
}

.result-icon {
  font-size: 22px;
}

.explanation-box {
  display: none;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-top: 12px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  border: 1px solid var(--border);
}

.explanation-box.show {
  display: block;
}

.explanation-box .exp-label {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  font-size: 13px;
}

/* Navigation */
.nav-bar {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 24px;
}

.nav-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-btn.prev {
  background: var(--card-bg);
  color: var(--text);
  border: 2px solid var(--border);
}

.nav-btn.prev:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.nav-btn.next {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 12px rgba(9,132,227,0.3);
}

.nav-btn.next:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(9,132,227,0.4);
}

.nav-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
}

/* Summary / completion */
.completion-panel {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 40px 24px;
  box-shadow: var(--shadow-lg);
  text-align: center;
  margin-top: 20px;
}

.completion-icon {
  font-size: 56px;
  margin-bottom: 16px;
}

.completion-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.completion-sub {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 24px;
  line-height: 1.7;
}

.completion-stats {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.comp-stat {
  text-align: center;
  padding: 16px 24px;
  background: var(--bg);
  border-radius: var(--radius-sm);
}

.comp-stat .value {
  font-size: 28px;
  font-weight: 700;
}

.comp-stat .label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.comp-stat.succ .value { color: var(--success); }
.comp-stat.fail .value { color: var(--danger); }

.action-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  background: var(--primary);
  color: #fff;
  margin: 4px;
}

.action-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(9,132,227,0.3);
}

.action-btn.secondary {
  background: var(--card-bg);
  color: var(--primary);
  border: 2px solid var(--primary);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-state .icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.empty-state .title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.empty-state .desc {
  color: var(--text-secondary);
  font-size: 14px;
}

/* Progress bar */
.progress-container {
  background: var(--border);
  border-radius: 10px;
  height: 6px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 10px;
  transition: width 0.5s ease;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

/* Responsive */
@media (max-width: 640px) {
  .header-stats { font-size: 12px; gap: 12px; }
  .question-card { padding: 20px 16px; }
  .question-text { font-size: 15px; }
  .mode-btn { font-size: 13px; padding: 8px 10px; }
  .completion-stats { flex-direction: column; }
}

/* Smooth page transition */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.question-card {
  animation: fadeSlideIn 0.3s ease;
}

/* Confetti-like celebration */
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.completion-icon {
  animation: pulse 1s ease infinite;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <div class="icon">&#x1F4DA;</div>
    <span>数据结构选择题练习系统</span>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <span class="stat-dot total"></span>
      <span>已做：<strong id="stat-done">0</strong></span>
    </div>
    <div class="stat-item">
      <span class="stat-dot correct"></span>
      <span>正确：<strong id="stat-correct">0</strong></span>
    </div>
    <div class="stat-item">
      <span class="stat-dot wrong"></span>
      <span>错题：<strong id="stat-wrong">0</strong></span>
    </div>
    <div class="stat-item">
      <span class="stat-dot remain"></span>
      <span>剩余：<strong id="stat-remain">0</strong></span>
    </div>
  </div>
</div>

<div class="main-container" id="app-root"></div>

<script>
// ===== DATA =====
const ALL_QUESTIONS = [

      }
    ],
    "answer": "C",
    "explanation": "解释：数据的逻辑结构分为两大类：线性结构（元素之间为一对一关系，如线性表、栈、队列、串）和非线性结构（元素之间为一对多或多对多关系，如树、图）。动态/静态、紧凑/非紧凑属于存储结构分类，内/外部属于存储介质分类。",
    "isKey": false
  },
  {
    "id": "ch1-q02",
    "chapter": 1,
    "chapterTitle": "绪论",
    "num": 2,
    "question": "与数据元素本身的形式、内容、相对位置、个数无关的是数据的（ ）。",
    "options": [
      {
        "letter": "A",
        "text": "存储结构"
      },
      {
        "letter": "B",
        "text": "存储实现"
      },
      {
        "letter": "C",
        "text": "逻辑结构"
      },
      {
        "letter": "D",
        "text": "运算实现"
      }
    ],
    "answer": "C",
    "explanation": "解释：逻辑结构描述数据元素之间的逻辑关系，与数据元素本身的物理存储形式和内容无关；存储结构才涉及数据在计算机中的表示。题目强调与形式、内容、位置、个数无关，指的正是逻辑结构。",
    "isKey": false
  },
  {
    "id": "ch1-q03",
    "chapter": 1,
    "chapterTitle": "绪论",

    "question": "通常要求同一逻辑结构中的所有数据元素具有相同的特性，这意味着（ ）。",

      {

    "answer": "B",

  },
  {

    "num": 4,
    "question": "以下说法正确的是（ ）。",
    "options": [
      {
        "letter": "A",
        "text": "数据元素是数据的最小单位"
      },
      {
        "letter": "B",

      {

  {

    "answer": "A",

// ===== STORAGE =====
const STORAGE_KEY = 'ds_mcq_practice';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { wrongIds: [], answeredIds: {}, mode: 'normal', chapterFilter: 0 };
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

let state = loadState();

// Ensure answeredIds keys match current question set
const currentIds = new Set(ALL_QUESTIONS.map(q => q.id));
let answeredIds = {};
for (const [id, correct] of Object.entries(state.answeredIds)) {
  if (currentIds.has(id)) answeredIds[id] = correct;
}
let wrongIds = state.wrongIds.filter(id => currentIds.has(id));
let mode = state.mode || 'normal';
let chapterFilter = 0;

function persist() {
  state.wrongIds = wrongIds;
  state.answeredIds = answeredIds;
  state.mode = mode;
  state.chapterFilter = chapterFilter;
  saveState(state);
}

// ===== DERIVED STATE =====
function getPool() {
  let pool = ALL_QUESTIONS.filter(q => q.chapter !== 7 && q.chapter !== 8);
  if (chapterFilter > 0) {
    pool = pool.filter(q => q.chapter === chapterFilter);
  }
  if (mode === 'review') {
    pool = pool.filter(q => wrongIds.includes(q.id));
  }
  if (mode === 'key') {
    pool = pool.filter(q => q.isKey);
  }
  return pool;
}

function getStats() {
  const pool = getPool();
  const total = pool.length;
  let done = 0, correct = 0;
  for (const q of pool) {
    if (q.id in answeredIds) {
      done++;
      if (answeredIds[q.id]) correct++;
    }
  }
  return { total, done, correct, wrong: done - correct, remain: total - done };
}

// Shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== APP STATE =====
let currentIndex = 0;
let shuffledPool = [];
let selectedOption = null;
let answered = false;
let currentCorrect = null;

function resetRound() {
  shuffledPool = shuffle(getPool());
  currentIndex = 0;
  selectedOption = null;
  answered = false;
  currentCorrect = null;
}

// ===== RENDER =====
const root = document.getElementById('app-root');

function updateHeaderStats() {
  const stats = getStats();
  document.getElementById('stat-done').textContent = stats.done;
  document.getElementById('stat-correct').textContent = stats.correct;
  document.getElementById('stat-wrong').textContent = stats.wrong;
  document.getElementById('stat-remain').textContent = stats.remain;
}

function render() {
  const pool = getPool();
  const stats = getStats();
  updateHeaderStats();

  // Reset if pool is empty
  if (pool.length === 0) {
    root.innerHTML = '';
    root.appendChild(buildEmptyState());
    return;
  }

  // Complete check
  if (stats.remain === 0) {
    root.innerHTML = '';
    root.appendChild(buildCompletionPanel(stats));
    return;
  }

  // Ensure shuffledPool matches
  if (shuffledPool.length === 0) {
    resetRound();
  }

  // Build DOM
  root.innerHTML = '';

  // Mode bar
  root.appendChild(buildModeBar());

  // Chapter filter
  if (mode === 'normal') {
    root.appendChild(buildChapterFilter());
  }

  // Progress
  root.appendChild(buildProgress(stats));

  // Question card
  if (currentIndex >= shuffledPool.length) {
    currentIndex = 0;
    shuffledPool = shuffle(pool);
  }
  const q = shuffledPool[currentIndex];
  root.appendChild(buildQuestionCard(q, stats));

  // Nav
  root.appendChild(buildNav(stats));
}

function buildModeBar() {
  const div = document.createElement('div');
  div.className = 'mode-bar';

  const normalBtn = document.createElement('button');
  normalBtn.className = 'mode-btn' + (mode === 'normal' ? ' active' : '');
  normalBtn.innerHTML = '&#x1F4DD; 练习模式';
  normalBtn.onclick = () => { mode = 'normal'; resetRound(); persist(); render(); };

  const keyBtn = document.createElement('button');
  keyBtn.className = 'mode-btn' + (mode === 'key' ? ' active' : '');
  const keyCount = ALL_QUESTIONS.filter(q => q.isKey && q.chapter !== 7 && q.chapter !== 8).length;
  keyBtn.innerHTML = `&#x2B50; 重点练习 <span class="badge">${keyCount}</span>`;
  keyBtn.onclick = () => { mode = 'key'; resetRound(); persist(); render(); };

  const reviewBtn = document.createElement('button');
  reviewBtn.className = 'mode-btn' + (mode === 'review' ? ' active' : '');
  reviewBtn.innerHTML = `&#x1F504; 错题集 <span class="badge">${wrongIds.length}</span>`;
  reviewBtn.onclick = () => { mode = 'review'; resetRound(); persist(); render(); };

  div.appendChild(normalBtn);
  div.appendChild(keyBtn);
  div.appendChild(reviewBtn);
  return div;
}

function buildChapterFilter() {
  const div = document.createElement('div');
  div.className = 'chapter-filter';

  const allChip = document.createElement('span');
  allChip.className = 'chapter-chip' + (chapterFilter === 0 ? ' active' : '');
  allChip.textContent = '全部章节';
  allChip.onclick = () => { chapterFilter = 0; resetRound(); persist(); render(); };
  div.appendChild(allChip);

  const chapters = [...new Set(ALL_QUESTIONS.map(q => q.chapter))].sort().filter(c => c !== 7 && c !== 8);
  const chNames = {1:'绪论',2:'线性表',3:'栈和队列',4:'串/数组/广义表',5:'树和二叉树',6:'图'};
  
  for (const ch of chapters) {
    const chip = document.createElement('span');
    chip.className = 'chapter-chip' + (chapterFilter === ch ? ' active' : '');
    chip.textContent = `第${ch}章 ${chNames[ch] || ''}`;
    chip.onclick = () => { chapterFilter = ch; resetRound(); persist(); render(); };
    div.appendChild(chip);
  }
  return div;
}

function buildProgress(stats) {
  const div = document.createElement('div');
  const pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
  div.innerHTML = `
    <div class="progress-info">
      <span>进度：${stats.done} / ${stats.total}</span>
      <span>${pct}%</span>
    </div>
    <div class="progress-container">
      <div class="progress-bar" style="width:${pct}%"></div>
    </div>
  `;
  return div;
}

function buildQuestionCard(q, stats) {
  const wasAnswered = q.id in answeredIds;
  answered = wasAnswered;
  currentCorrect = answeredIds[q.id];
  if (!wasAnswered) selectedOption = null;

  const div = document.createElement('div');
  div.className = 'question-card';
  if (answered) {
    div.className += answeredIds[q.id] ? ' answered-correct' : ' answered-wrong';
  }

  const chNames = {1:'绪论',2:'线性表',3:'栈和队列',4:'串/数组/广义表',5:'树和二叉树',6:'图',7:'查找',8:'排序'};

  div.innerHTML = `
    <div class="card-meta">
      <span class="chapter-tag">第${q.chapter}章 ${chNames[q.chapter] || q.chapterTitle}</span>
      ${q.isKey ? '<span class="key-tag">&#x2B50; 重点</span>' : ''}
      <span class="question-num">#${currentIndex + 1} / ${shuffledPool.length}</span>
    </div>
    <div class="question-text">${q.num}. ${escapeHtml(q.question)}</div>
    <div class="options-list" id="options-${q.id}"></div>
    <div class="result-bar ${answered ? 'show' : ''} ${answered && answeredIds[q.id] ? 'correct-result' : (answered ? 'wrong-result' : '')}" id="result-${q.id}">
      <span class="result-icon">${answered && answeredIds[q.id] ? '&#x2705;' : (answered ? '&#x274C;' : '')}</span>
      <span>${answered && answeredIds[q.id] ? '回答正确！' : (answered ? `回答错误！正确答案是 ${q.answer}` : '')}</span>
    </div>
    ${q.explanation ? `<div class="explanation-box ${answered ? 'show' : ''}" id="exp-${q.id}">
      <div class="exp-label">&#x1F4A1; 解析</div>
      ${escapeHtml(q.explanation)}
    </div>` : ''}
  `;

  // Build options
  const optionsList = div.querySelector(`#options-${q.id}`);
  for (const opt of q.options) {
    const btn = document.createElement('div');
    btn.className = 'option-btn';
    if (answered && opt.letter === q.answer) btn.className += ' correct-choice';
    if (answered && currentCorrect === false && opt.letter === selectedOption) btn.className += ' wrong-choice';
    if (answered) btn.className += ' disabled';

    btn.innerHTML = `
      <span class="option-letter">${opt.letter}</span>
      <span>${escapeHtml(opt.text)}</span>
      ${answered && opt.letter === q.answer ? '<span class="option-icon">&#x2705;</span>' : ''}
      ${answered && currentCorrect === false && opt.letter === selectedOption ? '<span class="option-icon">&#x274C;</span>' : ''}
    `;

    if (!answered) {
      btn.onclick = () => handleAnswer(q, opt.letter, div);
    }

    optionsList.appendChild(btn);
  }

  return div;
}

function buildNav(stats) {
  const div = document.createElement('div');
  div.className = 'nav-bar';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'nav-btn prev';
  prevBtn.innerHTML = '&#x2190; 上一题';
  prevBtn.disabled = currentIndex === 0;
  prevBtn.onclick = () => { currentIndex--; selectedOption = null; answered = false; currentCorrect = null; render(); };

  const nextBtn = document.createElement('button');
  nextBtn.className = 'nav-btn next';
  nextBtn.innerHTML = '下一题 &#x2192;';
  nextBtn.disabled = currentIndex >= shuffledPool.length - 1;
  nextBtn.onclick = () => { currentIndex++; selectedOption = null; answered = false; currentCorrect = null; render(); };

  div.appendChild(prevBtn);
  div.appendChild(nextBtn);
  return div;
}

function buildEmptyState() {
  const div = document.createElement('div');
  const pool = getPool();

  if (mode === 'review' && wrongIds.length === 0) {
    div.innerHTML = `
      <div class="completion-panel">
        <div class="completion-icon">&#x1F389;</div>
        <div class="completion-title">太棒了！所有错题都已清除</div>
        <div class="completion-sub">你已经掌握了所有做错的题目，继续加油！</div>
        <button class="action-btn" onclick="mode='normal';resetRound();persist();render();">&#x1F4DD; 回到练习模式</button>
      </div>
    `;
  } else if (mode === 'normal') {
    const chTag = chapterFilter > 0 ? '该章节' : '';
    div.innerHTML = `
      <div class="completion-panel">
        <div class="completion-icon">&#x1F3AF;</div>
        <div class="completion-title">${chTag}题目全部完成！</div>
        <div class="completion-sub">你已经做完了${chTag}所有选择题，可以切换到错题集复习错题</div>
        <button class="action-btn" onclick="chapterFilter=0;resetRound();persist();render();">&#x1F50D; 查看全部章节</button>
        <button class="action-btn" style="margin-top:8px" onclick="mode='review';resetRound();persist();render();">&#x1F504; 进入错题集 (${wrongIds.length})</button>
      </div>
    `;
  }
  return div;
}

function buildCompletionPanel(stats) {
  const div = document.createElement('div');
  div.className = 'completion-panel';

  const allCorrect = stats.wrong === 0;
  
  div.innerHTML = `
    <div class="completion-icon">${allCorrect ? '&#x1F389;' : '&#x1F4AA;'}</div>
    <div class="completion-title">${allCorrect ? '本轮全部正确，恭喜！' : '本轮已完成！'}</div>
    <div class="completion-sub">
      ${allCorrect 
        ? '全部题目都答对了，继续保持！' 
        : `还有 <strong>${stats.wrong}</strong> 道错误题目需要复习`}
    </div>
    <div class="completion-stats">
      <div class="comp-stat succ"><div class="value">${stats.correct}</div><div class="label">正确</div></div>
      <div class="comp-stat fail"><div class="value">${stats.wrong}</div><div class="label">错误</div></div>
      <div class="comp-stat"><div class="value">${stats.total}</div><div class="label">总题数</div></div>
    </div>
    ${allCorrect ? `
      <button class="action-btn" onclick="mode='normal';resetRound();persist();render();">&#x1F504; 再练一轮</button>
    ` : `
      <button class="action-btn" onclick="mode='review';resetRound();persist();render();">&#x1F504; 进入错题集复习 (${stats.wrong})</button>
      <button class="action-btn secondary" onclick="mode='normal';resetRound();persist();render();">&#x1F4DD; 重新练习全部</button>
    `}
    <div style="margin-top:16px">
      <button class="action-btn secondary" style="font-size:13px;padding:8px 18px" onclick="resetAllData()">&#x1F5D1; 清除所有记录</button>
    </div>
  `;
  return div;
}

// ===== HANDLERS =====
function handleAnswer(q, optLetter, cardEl) {
  if (answered) return;
  
  selectedOption = optLetter;
  answered = true;
  currentCorrect = (optLetter === q.answer);
  
  // Update answeredIds
  answeredIds[q.id] = currentCorrect;
  
  // Update wrongIds
  if (!currentCorrect) {
    if (!wrongIds.includes(q.id)) {
      wrongIds.push(q.id);
    }
  } else {
    wrongIds = wrongIds.filter(id => id !== q.id);
  }
  
  persist();

  // Re-render the card to show result
  // Find the card element and update it
  const pool = getPool();
  const stats = getStats();
  
  // Replace just the card
  const oldCard = cardEl;
  const newCard = buildQuestionCard(q, stats);
  oldCard.parentNode.replaceChild(newCard, oldCard);
  
  updateHeaderStats();

  // Manual navigation — user clicks prev/next buttons
}

function resetAllData() {
  if (confirm('确定要清除所有练习记录吗？这将删除所有做题痕迹和错题记录。')) {
    wrongIds = [];
    answeredIds = {};
    mode = 'normal';
    chapterFilter = 0;
    persist();
    resetRound();
    render();
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== INIT =====
(function() {
  const pool = getPool();
  if (pool.length > 0 && currentIndex === 0 && shuffledPool.length === 0) {
    resetRound();
  }
  render();
})();
</script>
